services:
  - type: web
    name: quan-portfolio-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CHROMA_PATH
        value: chroma
      - key: DATA_DIR
        value: data
      - key: CORS_ORIGINS
        value: http://localhost:5173,http://127.0.0.1:5173,https://dolamquan.github.io
      - key: LLM_MODEL
        value: llama3.2
      - key: EMBEDDING_MODEL
        value: nomic-embed-text
      - key: OLLAMA_HOST
        value: http://127.0.0.1:11434
